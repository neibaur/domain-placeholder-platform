name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate project
    runs-on: ubuntu-latest
    env:
      PUBLIC_SITE_URL: https://example.com
      PUBLIC_SITE_NAME: Domain Placeholder
      PUBLIC_SITE_TITLE: Domain Placeholder
      PUBLIC_SITE_DESCRIPTION: A lightweight placeholder page for a reserved domain.
      PUBLIC_PRIMARY_LOCALE: en
      PUBLIC_SECONDARY_LOCALE: zh-CN
      PUBLIC_ROBOTS_INDEX: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm validate
        env:
          PA11Y_CHROME_PATH: /usr/bin/google-chrome
